l_simp_chinese:


 #####tech


 tech_mtp_dimension_stride_research:0 "§W跨纬度研究§!£research£"
 tech_mtp_dimension_stride_research_desc:0 "我们的技术很难再有本质突破了，科学家们只能开始想办法对维度展开研究，通过调整引力对应特殊的震幅，理论上可以削弱维度之间的屏障，如果我们能实现这项技术，打破屏障并保持跨纬度互动，那我们也许可以利用这个技术大大缩小舰船结构占据的空间，还能更好的保护重要的结构，毕竟，我们的敌人不太可能跨越维度去摧毁我们战舰的要害。（解锁跨纬度研究科技树）"
 tech_mtp_dimension_4_material_transfer:0 "§B四维物质传送机"
 tech_mtp_dimension_4_material_transfer_desc:0 "如今我们的科学家已经对跨纬度研究有不少进展，四维物质传送零号机已经完成设计，它可以打破我们与四维空间的隔阂，一旦建造完成，我们就可以将那些宝贵的资源储存在四维空间，那里绝对不会有小偷。这是我们对于跨纬度研究成果的首次应用。"
 tech_mtp_gravitation_micro_dimension_field:0 "§L小型微势面褶皱力场"
 tech_mtp_gravitation_micro_dimension_field_desc:0 "我们的科学已经完成了当初的构想，我们成功将维度跨越装置缩小到可以直接装载在舰船上的程度，同时还能保持维度那边的结构和我们保持互动，这样我们可以将飞船的大部分核心结构存放在四维空间了，这将节省大量的空间来让我们堆放装甲甚至新增大量功能区和武器。我们相信跨纬度技术还能得到更多的应用。"
 tech_mtp_gravitation_space_compression:0 "运输船空间压缩"
 tech_mtp_gravitation_space_compression_desc:0 "工程师们很快就把舰船四维压缩技术用在了运输船上，节省出的大量空间又可以装载更多士兵了，不过预算也得多不少，不过，战斗力才是第一指标。"
 tech_mtp_dimension_material_extraction:0 "四维高价值物提取技术"
 tech_mtp_dimension_material_extraction_desc:0 "正如我们所构想的一样，其他维度的空间也不是空无一物的，是时候想办法将那些奇妙的高维度物质转化成宝贵的资源了！"
 tech_mtp_soulence_food_addition:0 "§H杜粹食品添加"
 tech_mtp_soulence_food_addition_desc:0 "我们发现了一种来自四维空间的新物质，我们将其命名为‘杜粹’，这种物质如果摄入我们体内，能对我们的精神力量有很大增强，他还能影响机械结构，提升我们的量子计算机运算效率。我们暂时还不知道原理是什么，也不知道是否有副作用，但我们已经等不及将‘杜粹’加入我们的食物来强化我们了。"
 tech_mtp_dimension_defensenet:0 "§B定向降维防御网络"
 tech_mtp_dimension_defensenet_desc:0 "将维度技术应用到军事上是我们早就想做的事，如今我们构想了一种全新的防御网络系统，它并不是一个更高级的能量屏障，他是经过特殊设计的维度传送机，它将可以在小范围内将一个极小维度薄弱点投射到任何位置，虽然没办法大面积投射，但是配合我们先进的人工智能可以对对方的火力进行精确投射，从而将那些本该击中我们的火力倾泻到更底维度去。"
 tech_mtp_dimension_2_manipulation:0 "二维时空操控"
 tech_mtp_dimension_2_manipulation_desc:0 "如果我们可以操控二维时空，那我们就能将维度本身用于各种领域。"
 tech_mtp_dimension_2_pacification:0 "§Y二向箔恒星杀手"
 tech_mtp_dimension_2_pacification_desc:0 "这项研究将彻底扭转整个银河的战争，我们离神更进一步了，我们如今可以利用强磁约束一整块二维平面，从而将其用于战争，我们的巨像将其投射并完全穿过整个目标恒星，这将杀死恒星并释放出难以置信的能量，彻底摧毁整个恒星系。"
 tech_mtp_soulence_metal_synthesis:0 "杜粹金属合成"
 tech_mtp_soulence_metal_synthesis_desc:0 "杜粹物质的结构令人着迷，我们还不知道这种物质能有哪些作用，但其蕴含的能量异常强大，我们在从四维空间提取杜粹时，它在降维过程中产生了副产品，合金。"
 tech_mtp_soulence_reinforced_armor:0 "杜粹强化装甲"
 tech_mtp_soulence_reinforced_armor_desc:0 "我们在尝试用杜粹这种无形物质本身和降维它产生的副产品合金融合时，竟然创造了新的物质，我们暂且叫它‘杜粹合金’，这种合金的特性令人着迷，他能快速恢复自己被设定的形状，同时分子排列又密不可分，质地坚硬无比，很适合用来当作装甲。更意外的是，这种装甲还能持续释放能量。"
 tech_mtp_reduced_dimension_reactor:0 "降维反应堆"
 tech_mtp_reduced_dimension_reactor_desc:0 "这个反应堆构想是一个包裹在强磁约束下的降维力场，通过持续将高密度物质降维释放出难以置信的能量。"
 tech_mtp_dimension_energy_application:0 "超能量应用"
 tech_mtp_dimension_energy_application_desc:0 "尽管目前我们的反应堆已经能够生存源源不断的能量，但我们的科学家依旧提议尝试去利用那些来自其他维度的能量。"
 tech_mtp_molecular_decomposition:0 "连锁分子分解力场"
 tech_mtp_molecular_decomposition_desc:0 "来自维度外的能量被我们应用起来，我们还是将它做成了武器。这种能量力场能够引起连锁反应，轻松分解范围内有机生物的分子结构，并释放能量，最终留下来的只有带着等离子的尘土，这是文明的骨灰。"
 mtp_tech_sublevel_focusing:0 "次能级聚焦"
 mtp_tech_sublevel_focusing_desc:0 "提升降维武器所使用的能级能大大提高力场投射范围，提升打击效果。"
 mtp_tech_module_cooling:0 "模块化散热"
 mtp_tech_module_cooling_desc:0 "用于各种尺寸的维度武器的通用模块化散热组件已被研发出来，我们只需要强化和加装模块就能提升散热效率，加快武器攻击速度。"
 mtp_tech_dimension_communication:0 "跨纬度通讯管理"
 mtp_tech_dimension_communication_desc:0 "逐渐成熟的跨纬度通讯系统和方案能让我们越来越有效的指挥我们的强大舰队。"
 mtp_tech_thought_stamp:0 "思想钢印"
 mtp_tech_thought_stamp_desc:0 "思想钢印是由我们一位高级海军将领提出的，用于提高我们的效率，巩固军心，利用杜粹对有机体和智能机械的影响，给每一位战士植入服从于冷酷。听说这事一种不道德的精神控制，不过这又有什么关系呢？"


 #####################
 # 维度研究
 #####################
 tech_mtp_dimension_2_research:0 "二维空间研究"
 tech_mtp_dimension_2_research_desc:0 "即使二维比我们低一维，但我们也有必要研究其中的价值。"
 tech_mtp_dimension_4_research:0 "四维空间研究"
 tech_mtp_dimension_4_research_desc:0 "四维空间的理论存在多年，是时候真正下手开始研究了。"
 tech_mtp_dimension_5_research:0 "五维空间研究"
 tech_mtp_dimension_5_research_desc:0 "五维空间对我们来说还深不可测。"
 tech_mtp_dimension_6_research:0 "六维空间研究"
 tech_mtp_dimension_6_research_desc:0 "六维空间似乎拥有奇怪的负曲率。"
 tech_mtp_dimension_7_research:0 "七维空间研究"
 tech_mtp_dimension_7_research_desc:0 "我们如今已经可以缓慢的理解七维空间的本质了。"
 tech_mtp_dimension_8_research:0 "八维空间研究"
 tech_mtp_dimension_8_research_desc:0 "八维空间研究已经在我们的日程表上。"
 tech_mtp_dimension_9_research:0 "九维空间研究"
 tech_mtp_dimension_9_research_desc:0 "九维空间的研究似乎有了突破。"
 tech_mtp_dimension_10_research:0 "十维空间研究"
 tech_mtp_dimension_10_research_desc:0 "十维空间研究对我们很重要。"
 tech_mtp_dimension_11_research:0 "十一维空间研究"
 tech_mtp_dimension_11_research_desc:0 "这是维度基础研究的终点，但不是我们进步的终点。"
 tech_mtp_dimension_of_ascensions:0 "§H=升维="
 tech_mtp_dimension_of_ascensions_desc:0 "随着我们的最后一个公民植入全新搭载维度穿梭模块的智能芯片，我们的种族，彻底成为了神，没有什么能够阻挡我们的力量。"
 tech_mtp_dimension_parallel_universe_window:0 "§W窥视之窗"
 tech_mtp_dimension_parallel_universe_window_desc:0 "首席科学家沃尔特·贝肖普研究出了一种能分离光子调节波长的窗户，这个窗户能让我们通过窗户看到平行世界，我们能够通过它学习平行世界的我们更加优秀的地方，剽窃他们的技术，研究他们的社会。"
 tech_mtp_dimension_reduce_theory:0 "§G维度理论"
 tech_mtp_dimension_reduce_theory_desc:0 "我们的科学家首次提出维度理论。"
 tech_mtp_dimension_reduce_polymerization:0 "定向聚合集束降维力场"
 tech_mtp_dimension_reduce_polymerization_desc:0 "继上次维度传送机被我们改造成防御网后，聪明的科学家又想出了一种让他变成武器的方法。通过高能力场配合我们的人工智能，我们能让一小束降维力场在稍微远距离的地方投射，从而达到作为武器的要求，这样的武器能够无比轻松的穿过敌人的能量护盾，对船体造成巨量的直接伤害，唯一需要改进的就是射程。"
 tech_mtp_phasestate_framework_dissociation:0 "空间构架解离技术"
 tech_mtp_phasestate_framework_dissociation_desc:0 "扭曲空间的形状不过是对时空技术的基础应用，我们需要的是对时空结构的直接塑造，但基态真空作为常规宇宙的能量最低点，它的稳定性强大而难以撼动，让我们望而却步。\n\n但在另一物理谱系中发现的一种奇异基本粒子改变了这一切，这种被我们命名为"尘子"的基本粒子能够切断引力场之间的自相互作用，将空间本身分割成一个个独立的基本单元，直到"尘子"扩散殆尽。\n\n有了它，真空将会如同橡皮泥一样可塑，只是再现这种物质的代价有些过于昂贵......"


