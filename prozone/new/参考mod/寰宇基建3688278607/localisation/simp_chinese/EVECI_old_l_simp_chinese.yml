 mtp_systkill.001.name:0 "§R星系已被摧毁"
 mtp_systkill.001.desc:0 "§R“请你告诉我，你们使用我的造物摧毁那个星系是迫不得已！”§E ———— 二向箔武器首席科学家 匿名。\n§L我们终究是使用了这个毁灭性的武器来彻底摧毁整个恒星系，随着恒星触碰二维平面的一瞬间，巨大的能量被释放，顷刻间恒星不再耀眼，消逝在了岁月长河中，而她死亡前释放出最后的余晖将这个曾经繁荣富饶的星系化为灰烬。\n§R但我们不后悔，战争从来没有怜悯可言！"

