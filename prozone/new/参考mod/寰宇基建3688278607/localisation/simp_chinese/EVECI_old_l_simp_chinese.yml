 #资源
 mtp_elementenzyme:"空间构架解离酶"
 mtp_elementenzyme_desc:"空间构架解离酶能够削弱量子共形场中粒子的相干性，进而削弱常规空间中空间架构的稳定性，只需要一点点，就可以让真空变得如同橡皮泥一样可塑。"
 mtp_soulence:"杜粹"
