 building_mtp_mtp_elementenzyme_synthesis:"异质合成站"
 building_mtp_mtp_elementenzyme_synthesis_desc:"复杂的工业站点不断的吞吐着大量的原料，用于合成及其珍惜的战略资源。"
 building_mtp_cross_dimensional_mine:"跨维度矿井"
 building_mtp_cross_dimensional_mine_desc:"长长的走廊，一个又一个的隔间中摆放着一个又一个活体安全规格的跨维度传送机，高额的赏金下招来了一个又一个专业的维度矿工，他们称自己为杜粹猎人。"
 building_mtp_heart_of_the_end:"终末之心"
 building_mtp_heart_of_the_end_desc:"散发着神秘红光的金字塔，由参杂杜粹的高强度合金包裹，我想我们最好不要向好奇的民众公布里面到底是些什么玩意儿。"
 building_mtp_heart_of_the_end_effect_desc:"这个神秘的金字塔里利用空间技术囚禁着一个小型的人造黑洞，围绕在周围的装置源源不断的汲取着我们需要的£sr_dark_matter£ §R$sr_dark_matter$§!。"
 building_mtp_planes_anchor:"子空间综合管理部"
 building_mtp_planes_anchor_desc:"§Y解锁决策§!：星球子空间开辟\n\n用于管理各个高维子空间的部门，主要职能有§Y子空间状态监控§!、§Y次元锚系统维护§!、§Y高维通道调控§!等。"
