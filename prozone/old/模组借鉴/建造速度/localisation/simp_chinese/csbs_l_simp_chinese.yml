l_simp_chinese:
 edict_csbs_ed: "§Y调整舰船建造速度§!"
 edict_csbs_ed_desc: "可快可慢。"

 csbs_ms: "舰船建造速度调整"
 csbs_ms_desc: "可快可慢。"

 csbs.1.a: "§G就到这里吧§!"
 csbs.1.a.tt: "离开此窗口"
 csbs.1.b: "§R清除当前修正§!"
 csbs.1.desc: "当前舰船建造速度修正：§Y[root.csbs_now]%§!\n你可以在此调整舰船速度，注意，以下选项可以§Y叠加§!生效，举例来说选择两次§G增加10%§!则最终修正的数值就是§G+20%§!，同时在特殊情况下，可以再次选择多次减少来达到减慢舰船建造速度的效果，例如再次选择两次§R减少100%§!则最终修正的数值就是§R-180%§!，到达心仪的幅度时可以选择选项§G就到这里吧§!离开此窗口。"
 csbs.1.title: "调整舰船建造速度"
 csbs_no_modifier: "§R你还没有对舰船速度进行调整§!"

 csbs.1.10: "§G增加10%§!"
 csbs.1.50: "§G增加50%§!"
 csbs.1.100: "§G增加100%§!"
 csbs.1.-10: "§R减少10%§!"
 csbs.1.-50: "§R减少50%§!"
 csbs.1.-100: "§R减少100%§!"

 csbs.1.10.tt: "舰船建造速度增加10%"
 csbs.1.50.tt: "舰船建造速度增加50%"
 csbs.1.100.tt: "舰船建造速度增加100%"
 csbs.1.-10.tt: "舰船建造速度减少10%"
 csbs.1.-50.tt: "舰船建造速度减少50%"
 csbs.1.-100.tt: "舰船建造速度减少100%"
