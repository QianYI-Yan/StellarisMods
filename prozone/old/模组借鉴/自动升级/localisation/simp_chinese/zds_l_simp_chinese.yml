 edict_zds_module_desc: "你可以设定一个恒星基地§Y模块§!的§Y模板§!，§Y每月§!将§Y所有§!恒星基地的§Y模块§!统一建设为此模板。\n§R测试功能，性能占用较大，谨慎按需使用§!\n有任何问题或建议可向§G电子邮箱§!反馈后投稿，详见模组详情页"

