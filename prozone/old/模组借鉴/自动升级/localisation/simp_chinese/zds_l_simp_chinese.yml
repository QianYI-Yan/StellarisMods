 zds_module.1.desc: "在这里你可以设定一个恒星基地模块部分的§Y模板§!，§Y每月§!将§Y所有§!恒星基地的模块统一建设为此模板。\n说明：\n1.对应的格子点进去可以选择你需要且支持的模块，如设置为无则代表§G跳过§!建设此格。\n2.当前仅支持§Y船坞§!和§Y锚地§!两种模块的设置。\n3.此语法为if地狱，很可能有较大的§R性能开销§!，建议每月一次生效后§R不要连续保持开启§!。\n4.有任何问题或建议可向§G电子邮箱§!反馈后投稿，详见模组详情页"

