 tjxb_country_event.0.name: "来自作者的通讯"
 tjxb_country_event.0.desc: "嗨，我是铁甲小白，本模组作者。\n作为上层叙事，你可以在本局游戏随时召唤我。\n点击按钮，之后就可以在通讯界面找到我啦。\n对了，AI不会触发这个事件，如果你切到别的帝国在通讯界面没找到我，请手动触发本事件。（id为tjxb_country_event.0）"
 tjxb_country_event.0.z: "喂，你根本没给别的选择吧"

 tjxb_country_event.10.name: "铁甲小白"
 tjxb_country_event.10.desc: "这是一个占位符界面，受制于原版代码，为了防止你联系小灰时也跳转到我的通讯界面，请点击右侧按钮跳转到真正的界面。"
 tjxb_country_event.10.a: "跳转到真正的通讯界面"

 tjxb_country_event.11.name: "铁甲小白"
 tjxb_country_event.11.desc: "本模组仍在持续更新中，有什么需求可以随时以任意方式联系作者。欢迎订阅强迫症系列模组。\n嗨，我是铁甲小白，请问有什么需求？"
 tjxb_country_event.11.b: "（询问一些有关作者的问题）"
 tjxb_country_event.11.paragon: "领袖/内阁/英杰相关"
 tjxb_country_event.11.d: "给我特殊科技/研究选项"
 tjxb_country_event.11.e: "L星门机械爹先驱者开局设置"
 tjxb_country_event.11.f: "一些诸如安抚变形虫之类的事件"
 tjxb_country_event.11.g: "一键抢夺所有国家的标本和遗珍"
 tjxb_country_event.11.z: "结束通讯"

 tjxb_country_event.13.name: "有关作者的信息"
 tjxb_country_event.13.desc: "这是一些对话选项。"
 tjxb_country_event.13.a: "你有Q群之类的吗？"
 tjxb_country_event.13.a.response: "不好意思，作者近期没有经历维护Q群之类的社区。等未来我有空再说。"
 tjxb_country_event.13.b: "我可以通过哪些方式联系你？"
 tjxb_country_event.13.b.response: "如果你对模组有任何想说的，最简单的方法就是在创意工坊对应模组下方留言，我会不时查看。"
 tjxb_country_event.13.c: "你在哪些平台有号？"
 tjxb_country_event.13.c.response: "一般来说，我在几乎所有平台都使用相同的用户名“铁甲小白”或者“铁甲小白tjxb”或者“ArmourSkeleton”。\n不过我基本上只在哔哩哔哩和百度贴吧活跃，基本上不看抖音快手小红书微博知乎小黑盒。"
 tjxb_country_event.13.d: "你不是做Minecraft整合包的吗？为什么看到你在做三国杀DIY？"
 tjxb_country_event.13.d.response: "如果你是从SCP或者别的圈子来的，我表示道歉，我并没有弃坑，做会在处理好生活上的问题后回归这些圈子。"

 tjxb_country_event.27.name: "一键抢夺所有国家的标本和遗珍"
 tjxb_country_event.27.desc: "一键抢夺所有国家的标本和遗珍"
 tjxb_country_event.27.a: "一键抢夺所有国家的标本和遗珍"
 tjxb_country_event.27.b: "一键抢夺所有国家的遗珍"
 tjxb_country_event.27.c: "一键抢夺所有国家的标本"

