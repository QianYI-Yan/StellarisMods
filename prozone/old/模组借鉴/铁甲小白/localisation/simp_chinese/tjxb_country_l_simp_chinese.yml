 OCD_paragon_event.7.name: "$CLASS_TIER_LEGENDARY$"
 OCD_paragon_event.7.desc: "由于每个$CLASS_TIER_LEGENDARY$的事件链都很复杂，为了尽可能避免bug，改为尝试开启对应事件链。\n选择对应选项后，会在几天后才触发对应事件链\n所有选项只允许选择一次，否则可能导致重复触发导致bug。\n乍狄伽需要境内有星系没有虫洞。\n斯克兰德需要已经建立或修复星门。"
 OCD_paragon_event.7.a: "$NAME_Gray$，开启L星门事件链。"
 OCD_paragon_event.7.b: "$NAME_The_Beholder$，直接获得低语金字塔。"
 OCD_paragon_event.7.c: "$NAME_Formless_leader$，触发水晶球体事件，开启无形异使事件链。"
 OCD_paragon_event.7.d: "$NAME_CaptainNess$，暂时禁用。"
 OCD_paragon_event.7.e: "$NAME_Astrocreator_Azaryn$，直接触发招募艾莎琳的事件。"
 OCD_paragon_event.7.f: "$NAME_Exakeides$，因未知原因无法生成杜戈尔星系，该选项禁用。"
 OCD_paragon_event.7.g: "$NAME_Skrand_Sharpbeak$，触发利爪号到达事件。"

