 tjxb_country_event.200.d: "L星门"
 tjxb_country_event.200.i: "先驱者"

 tjxb_country_event.202.name: "L星门和机械堕落"
 tjxb_country_event.202.desc: "警告：仅允许在机械爹觉醒前使用该设置.推荐在游戏开始时设置。"
 tjxb_country_event.202.a: "上古看护者：最终防御协议"
 tjxb_country_event.202.b: "上古看护者：屠戮机器"

 tjxb_country_event.204.name: "L星门设置"
 tjxb_country_event.204.desc: "警告：仅允许在开启L星门事件链前进行设置。若在L星门事件链期间进行修改可能导致事件链卡死。\n推荐在游戏开始时进行设置。"
 tjxb_country_event.204.a: "L星门：灰蛊风暴"
 tjxb_country_event.204.b: "L星门：L星龙"
 tjxb_country_event.204.c: "L星门：德萨努协和国"
 tjxb_country_event.204.d: "L星门：诡异的宁静"

 tjxb_country_event.209.name: "先驱者设置"
 tjxb_country_event.209.warm: "警告：该设置具有破坏性，请再三考虑后于进行设置！"
 tjxb_country_event.209.a: "警告"
 tjxb_country_event.209.b: "请点击该选项查看注意事项1"
 tjxb_country_event.209.b.response: "原版的先驱者事件链触发方式和限制的代码很糟糕。\n原理为：游戏开始时，根据初始设置将每个先驱者对应的star_flag随机分配到地图上的星系。当你的科研船探索对应星系时，会触发先驱者event给你的国家添加对应country_flag，然后你就不再能触发其他先驱者事件链。\n为了避免修改原版代码，我写了一套“备选事件”绕过限制，“允许触发多个先驱者”选项将启用这一套事件，这样就能同时触发多个先驱者事件链了。"
 tjxb_country_event.209.c: "请点击该选项查看注意事项2"
 tjxb_country_event.209.c.response: "原版只能在探索拥有对应star_flag的星系时才能触发事件链，这些星系很少，为了保证玩家100%触发所有先驱者事件链，选项“为所有星系添加所有先驱者star_flag”将为整个地图所有星系添加先驱者的star_flag，注意，这会无视你的初始设置。"
 tjxb_country_event.209.d: "请点击该选项查看注意事项3"
 tjxb_country_event.209.d.response: ""
 tjxb_country_event.209.e: "请点击该选项查看注意事项4"
 tjxb_country_event.209.e.response: ""
 tjxb_country_event.209.x: ""
 tjxb_country_event.209.y: "允许触发多个先驱者（必须在你开始探索之前设置！）"
 tjxb_country_event.209.y.response: "你已选择“使用备选事件（允许触发多个先驱者）”\n该选项不可逆！"
 tjxb_country_event.209.z: "为所有星系添加所有先驱者star_flag"
 tjxb_country_event.209.z.response: "你已选择“为所有星系添加所有先驱者star_flag”\n该选项不可逆！"
 tjxb_country_event.2099.name: "为所有星系添加某个先驱者的star_flag"
 tjxb_country_event.2099.desc: "警告：点击对应的选项就生效，且设置不可逆！"
